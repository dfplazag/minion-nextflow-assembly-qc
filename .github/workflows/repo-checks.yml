name: repo-checks

on:
  push:
  pull_request:

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Verify required repository files exist
        run: |
          test -f main.nf
          test -f nextflow.config
          test -f README.md
          test -f CHANGELOG.md
          test -f LICENSE
          test -f envs/environment.yml
          test -f bin/join_nanostats_summary.py

      - name: Python syntax check
        run: python -m py_compile bin/join_nanostats_summary.py

      - name: Install lightweight linters
        run: |
          python -m pip install --upgrade pip
          pip install yamllint mdformat

      - name: YAML lint
        run: |
          yamllint .github/workflows/repo-checks.yml
          yamllint envs/environment.yml
          yamllint conf/user_paths.template.config || true

      - name: Markdown format check
        run: |
          mdformat --check README.md CHANGELOG.md CONTRIBUTING.md docs/*.md

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/nextflow
          nextflow -version

      - name: Basic Nextflow config parse
        run: nextflow config -flat -c nextflow.config
